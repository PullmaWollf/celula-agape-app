<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Célula Ágape</title>

<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{margin:0;font-family:Arial;background:#f3efe7}
header{text-align:center;padding:20px;font-size:22px;font-weight:bold}
.container{max-width:700px;margin:auto;padding:15px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:12px}
button{width:100%;padding:10px;background:#b48a4a;color:#fff;border:none;border-radius:8px;margin-top:10px}
input,textarea,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ddd}
.post{border-bottom:1px solid #eee;padding:10px 0}
.meta{font-size:12px;color:#777}
.chip{display:inline-block;background:#eee;padding:5px 10px;border-radius:999px;margin:3px}
.admin{background:#ffe7c2}
</style>
</head>

<body>

<header>Célula Ágape</header>

<div class="container">

<div class="card">
<h3>Login</h3>
<input id="email">
<input id="password" type="password">
<button onclick="login()">Entrar</button>
</div>

<div id="adminPanel" class="card admin" style="display:none">
<h3>Painel Admin</h3>
<button onclick="createUser()">Criar Usuário</button>
</div>

<div class="card">
<h3>Mural</h3>
<textarea id="msg"></textarea>
<button onclick="sendPost()">Publicar</button>
<div id="posts"></div>
</div>

<div class="card">
<h3>Escala</h3>
<input type="date" id="date">
<select id="members" multiple></select>
<button onclick="addEscala()">Salvar</button>
</div>

<div id="lista"></div>

</div>

<script>

const supabaseUrl = 'https://evvbfmnacsaoctdxybdb.supabase.co'
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV2dmJmbW5hY3Nhb2N0ZHh5YmRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjE0NjgsImV4cCI6MjA5MDQ5NzQ2OH0.q5P_Q__xwFrPgGE2KyrQuVePG8t9J-YKcd2bL4GdHs0'
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

let currentUser = null
let isAdmin = false

// LOGIN
async function login(){
 const email = document.getElementById('email').value
 const password = document.getElementById('password').value

 const {data,error} = await supabase.auth.signInWithPassword({email,password})

 if(error){alert(error.message);return}

 currentUser = data.user
 alert('Login realizado')

 await checkRole()
 await initNotifications()
}

// VERIFICAR ROLE
async function checkRole(){
 const {data} = await supabase
  .from('users')
  .select('*')
  .eq('email', currentUser.email)
  .single()

 if(data && data.role === 'admin'){
  isAdmin = true
  document.getElementById('adminPanel').style.display = 'block'
 }
}

// NOTIFICAÇÕES
async function initNotifications(){
 if('Notification' in window){
  await Notification.requestPermission()
 }

 if('serviceWorker' in navigator){
  await navigator.serviceWorker.register('sw.js')
 }
}

// USERS
async function loadUsers(){
 const {data} = await supabase.from('users').select('*')
 document.getElementById('members').innerHTML =
  data.map(u=>`<option value="${u.name}">${u.name}</option>`).join('')
}

// ADMIN CRIAR USUÁRIO
async function createUser(){
 if(!isAdmin){alert('Apenas admin');return}

 const name = prompt('Nome')
 const email = prompt('Email')

 await supabase.from('users').insert({
  name,
  email,
  role: 'membro'
 })

 alert('Usuário criado')
 loadUsers()
}

// POSTS
async function sendPost(){
 if(!currentUser){alert('Faça login');return}

 const text = document.getElementById('msg').value

 await supabase.from('posts').insert({
  text,
  user_id: currentUser.id
 })

 document.getElementById('msg').value=''
}

// DELETAR POST (ADMIN)
async function deletePost(id){
 if(!isAdmin){alert('Apenas admin');return}

 await supabase.from('posts').delete().eq('id', id)
 loadPosts()
}

// LOAD POSTS
async function loadPosts(){
 const {data} = await supabase.from('posts').select('*').order('created_at',{ascending:false})

 document.getElementById('posts').innerHTML =
  data.map(p=>`
    <div class="post">
      <div>${p.text}</div>
      <div class="meta">${new Date(p.created_at).toLocaleString()}</div>
      ${isAdmin ? `<button onclick="deletePost(${p.id})">Excluir</button>` : ''}
    </div>
  `).join('')
}

// ESCALA
async function addEscala(){
 if(!isAdmin){alert('Só admin');return}

 const date = document.getElementById('date').value
 const members = [...document.getElementById('members').selectedOptions].map(o=>o.value)

 await supabase.from('escala').insert({date,members})
 loadEscala()
}

// LOAD ESCALA
async function loadEscala(){
 const {data} = await supabase.from('escala').select('*').order('date')

 document.getElementById('lista').innerHTML =
  data.map(e=>`
    <div class="card">
      <strong>${e.date}</strong><br>
      ${e.members.map(m=>`<span class="chip">${m}</span>`).join('')}
    </div>
  `).join('')
}

// REALTIME POSTS
supabase.channel('posts')
.on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},payload=>{
 loadPosts()

 if(Notification.permission === 'granted'){
  navigator.serviceWorker.getRegistration().then(reg=>{
    reg.showNotification('Novo Post', {body: payload.new.text})
  })
 }
})
.subscribe()

loadUsers()
loadPosts()
loadEscala()

</script>

</body>
</html>
